# Builds and publishes wheels for gilmap.
# Default triggers (push, PR, tag) build the supported native targets.
# `workflow_dispatch` additionally builds extra targets (x86, armv7, s390x,
# ppc64le, windows-arm) that are not on the default release path.
name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # PR builds skip py3.13 to halve wheel build time; push/tag builds full set.
  BUILD_ARGS: ${{ github.event_name == 'pull_request' && '--release --out dist -i python3.12' || '--release --out dist -i python3.12 -i python3.13' }}
  BUILD_ARGS_FULL: --release --out dist -i python3.12 -i python3.13

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: ${{ env.BUILD_ARGS }}
          sccache: true
          manylinux: auto
      - name: Smoke test wheel
        run: |
          python -m pip install -q --disable-pip-version-check pyarrow
          python -m pip install -q --disable-pip-version-check --no-deps --no-index --find-links dist gilmap
          python -m pip show gilmap
          python .github/scripts/smoke.py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-aarch64:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: ${{ env.BUILD_ARGS_FULL }}
          sccache: true
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: dist

  linux-extras:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86, armv7, s390x, ppc64le]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ env.BUILD_ARGS_FULL }}
          sccache: true
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  musllinux:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ env.BUILD_ARGS_FULL }}
          sccache: true
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  musllinux-extras:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86, armv7]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ env.BUILD_ARGS_FULL }}
          sccache: true
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: ${{ env.BUILD_ARGS }}
          sccache: true
      - name: Smoke test wheel
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          python -m pip install -q --disable-pip-version-check pyarrow
          python -m pip install -q --disable-pip-version-check --no-deps --no-index --find-links dist gilmap
          python -m pip show gilmap
          python .github/scripts/smoke.py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  windows-extras:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ env.BUILD_ARGS_FULL }}
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: ${{ env.BUILD_ARGS }}
          sccache: true
      - name: Smoke test wheel
        run: |
          python -m pip install -q --disable-pip-version-check pyarrow
          python -m pip install -q --disable-pip-version-check --no-deps --no-index --find-links dist gilmap
          python -m pip show gilmap
          python .github/scripts/smoke.py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  macos-x86_64:
    # macos-13 (Intel) runners have long queue times on hosted free tier.
    # Run only on manual dispatch; Intel-mac users install via sdist.
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: ${{ env.BUILD_ARGS_FULL }}
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [linux, linux-aarch64, musllinux, windows, macos, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/gilmap
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'dist/*'
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
